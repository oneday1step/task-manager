<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루한보 업무관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f3ee;
  --surface: #ffffff;
  --surface2: #f0e8dc;
  --surface3: #e4d5c2;
  --accent: #5c3a1e;
  --accent2: #c0392b;
  --accent3: #2e7d4f;
  --accent4: #b05e10;
  --text: #1a0f05;
  --text2: #5a3d25;
  --text3: #96785a;
  --border: rgba(92,58,30,0.2);
  --shadow: rgba(92,58,30,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
.app { max-width:1300px; margin:0 auto; padding:0 24px 48px; }

header { display:flex; align-items:center; justify-content:space-between; padding:28px 0 24px; border-bottom:3px solid var(--accent); margin-bottom:28px; }
.logo { display:flex; align-items:center; gap:14px; }
.logo-icon { width:44px; height:44px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 12px var(--shadow); }
.logo h1 { font-size:22px; font-weight:900; color:var(--accent); letter-spacing:-0.5px; }
.logo span { font-size:11px; color:var(--text3); display:block; margin-top:1px; }
.sync-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent3); animation:pulse 2s infinite; margin-right:4px; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.date-badge { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); background:var(--surface2); padding:7px 14px; border-radius:20px; border:1px solid var(--border); }

.stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 24px; position:relative; overflow:hidden; box-shadow:0 2px 8px var(--shadow); transition:transform 0.2s; }
.stat-card:hover { transform:translateY(-2px); }
.stat-card::before { content:''; position:absolute; top:0; left:0; width:5px; height:100%; }
.stat-card:nth-child(1)::before { background:var(--accent); }
.stat-card:nth-child(2)::before { background:var(--accent4); }
.stat-card:nth-child(3)::before { background:var(--accent3); }
.stat-card:nth-child(4)::before { background:var(--accent2); }
.stat-label { font-size:11px; color:var(--text3); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:40px; font-weight:900; font-family:'JetBrains Mono',monospace; line-height:1; }
.stat-card:nth-child(1) .stat-value { color:var(--accent); }
.stat-card:nth-child(2) .stat-value { color:var(--accent4); }
.stat-card:nth-child(3) .stat-value { color:var(--accent3); }
.stat-card:nth-child(4) .stat-value { color:var(--accent2); }
.stat-sub { font-size:11px; color:var(--text3); margin-top:4px; }

.filter-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
.filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
.filter-tab { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.filter-tab:hover { border-color:var(--accent); color:var(--accent); }
.filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.filter-count { font-family:'JetBrains Mono',monospace; font-size:10px; background:rgba(255,255,255,0.25); padding:1px 5px; border-radius:8px; }
.filter-tab:not(.active) .filter-count { background:var(--surface2); color:var(--text3); }

.btn-group { display:flex; gap:8px; align-items:center; }
.btn-add-task { background:var(--accent); border:none; border-radius:10px; padding:10px 20px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 3px 10px var(--shadow); }
.btn-add-task:hover { background:#4a2e18; transform:translateY(-1px); }
.btn-history { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 16px; color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-history:hover { border-color:var(--accent); color:var(--accent); }
.btn-clear { background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.25); border-radius:10px; padding:10px 16px; color:var(--accent2); font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-clear:hover { background:var(--accent2); color:#fff; }

.task-board { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.task-column { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 2px 8px var(--shadow); }
.task-column:nth-child(1) { border-top:4px solid var(--accent4); }
.task-column:nth-child(2) { border-top:4px solid var(--accent); }
.task-column:nth-child(3) { border-top:4px solid var(--accent3); }
.column-header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
.column-title { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--text); }
.col-dot { width:10px; height:10px; border-radius:50%; }
.col-dot.todo { background:var(--accent4); box-shadow:0 0 0 3px rgba(176,94,16,0.15); }
.col-dot.doing { background:var(--accent); box-shadow:0 0 0 3px rgba(92,58,30,0.15); }
.col-dot.done { background:var(--accent3); box-shadow:0 0 0 3px rgba(46,125,79,0.15); }
.col-count { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:#fff; padding:2px 8px; border-radius:10px; }
.task-column:nth-child(1) .col-count { background:var(--accent4); }
.task-column:nth-child(2) .col-count { background:var(--accent); }
.task-column:nth-child(3) .col-count { background:var(--accent3); }

/* 완료 컬럼 헤더 액션 */
.done-header-actions { display:flex; align-items:center; gap:8px; }
.btn-clear-done { background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.2); color:var(--accent2); padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.2s; }
.btn-clear-done:hover { background:var(--accent2); color:#fff; }

.task-list { padding:12px; min-height:240px; display:flex; flex-direction:column; gap:8px; }
.task-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px; transition:all 0.2s; animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.task-card:hover { background:var(--surface3); transform:translateX(3px); box-shadow:0 4px 12px var(--shadow); }
.task-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
.task-title { font-size:13px; font-weight:700; color:var(--text); line-height:1.4; }
.task-priority { font-size:10px; font-weight:700; padding:3px 8px; border-radius:6px; flex-shrink:0; }
.priority-high { background:rgba(192,57,43,0.12); color:var(--accent2); border:1px solid rgba(192,57,43,0.2); }
.priority-mid { background:rgba(176,94,16,0.12); color:var(--accent4); border:1px solid rgba(176,94,16,0.2); }
.priority-low { background:rgba(46,125,79,0.12); color:var(--accent3); border:1px solid rgba(46,125,79,0.2); }
.task-desc { font-size:11px; color:var(--text3); margin-bottom:6px; line-height:1.4; }
.task-note { font-size:11px; color:var(--text2); line-height:1.5; background:rgba(46,125,79,0.06); border-radius:6px; padding:8px; margin-top:8px; border-left:3px solid var(--accent3); }
.task-meta { display:flex; align-items:center; gap:8px; margin-top:10px; }
.task-assignee { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); font-weight:500; }
.mini-avatar { width:20px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; }
.avatar-me { background:var(--accent); }
.avatar-1 { background:var(--accent4); }
.avatar-2 { background:var(--accent3); }
.task-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); margin-left:auto; }
.btn-start { background:rgba(92,58,30,0.1); border:1px solid rgba(92,58,30,0.25); color:var(--accent); padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:700; transition:all 0.2s; }
.btn-start:hover { background:var(--accent); color:#fff; }
.btn-done { background:rgba(46,125,79,0.1); border:1px solid rgba(46,125,79,0.25); color:var(--accent3); padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:700; transition:all 0.2s; }
.btn-done:hover { background:var(--accent3); color:#fff; }
.btn-del { background:transparent; border:none; color:var(--text3); cursor:pointer; font-size:13px; padding:2px 6px; border-radius:4px; transition:all 0.2s; }
.btn-del:hover { color:var(--accent2); }
.add-task-btn { width:calc(100% - 24px); margin:0 12px 12px; background:transparent; border:1px dashed var(--border); border-radius:10px; padding:10px; color:var(--text3); font-family:'Noto Sans KR',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
.add-task-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(92,58,30,0.04); }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,15,5,0.45); backdrop-filter:blur(4px); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; width:520px; max-width:95vw; animation:modalIn 0.25s ease; box-shadow:0 24px 80px rgba(26,15,5,0.2); }
.modal-lg { width:720px; }
@keyframes modalIn { from{opacity:0;transform:translateY(12px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.modal-title { font-size:17px; font-weight:900; color:var(--text); }
.modal-close { background:var(--surface2); border:none; color:var(--text2); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.modal-close:hover { background:var(--surface3); }
.form-group { margin-bottom:16px; }
.form-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:block; }
.form-input, .form-select, .form-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; transition:border-color 0.2s; }
.form-textarea { min-height:80px; resize:none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(92,58,30,0.1); }
.form-select option { background:#fff; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn-primary { width:100%; background:var(--accent); border:none; border-radius:10px; padding:12px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; box-shadow:0 4px 12px var(--shadow); }
.btn-primary:hover { background:#4a2e18; transform:translateY(-1px); }

/* 히스토리 모달 */
.history-tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--surface2); padding:4px; border-radius:10px; }
.history-tab { flex:1; padding:8px; border-radius:7px; border:none; background:transparent; color:var(--text2); font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; text-align:center; }
.history-tab.active { background:var(--accent); color:#fff; }

.history-list { max-height:380px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.history-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.history-item-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.history-item-title { font-size:13px; font-weight:700; color:var(--text); }
.history-item-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); }
.history-item-note { font-size:12px; color:var(--text2); line-height:1.5; padding:6px 8px; background:rgba(46,125,79,0.06); border-radius:6px; border-left:3px solid var(--accent3); }
.history-empty { text-align:center; padding:32px; color:var(--text3); font-size:13px; }

.history-footer { margin-top:16px; display:flex; gap:8px; }
.btn-danger { flex:1; background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.25); color:var(--accent2); border-radius:10px; padding:11px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-danger:hover { background:var(--accent2); color:#fff; }
.btn-secondary { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text2); border-radius:10px; padding:11px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

.loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:16px; }
.loading-spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:13px; color:var(--text3); }
.toast { position:fixed; bottom:24px; right:24px; background:var(--accent); border-radius:12px; padding:14px 20px; font-size:13px; color:#fff; box-shadow:0 8px 24px var(--shadow); z-index:200; display:none; animation:toastIn 0.3s ease; }
@keyframes toastIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:4px; }
@media(max-width:800px) {
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .task-board{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">불러오는 중...</div>
</div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🚀</div>
      <div>
        <h1>하루한보 업무관리</h1>
        <span><span class="sync-dot"></span>실시간 공유 중</span>
      </div>
    </div>
    <div class="date-badge" id="dateDisplay"></div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">전체 업무</div><div class="stat-value" id="statTotal">0</div><div class="stat-sub">등록된 태스크</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value" id="statDoing">0</div><div class="stat-sub">처리 중인 업무</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-value" id="statDone">0</div><div class="stat-sub">처리 완료</div></div>
    <div class="stat-card"><div class="stat-label">완료율</div><div class="stat-value" id="statRate">0%</div><div class="stat-sub">목표 달성 현황</div></div>
  </div>

  <div class="filter-bar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterMember('all',this)">전체 <span class="filter-count" id="cnt-all">0</span></button>
      <button class="filter-tab" onclick="filterMember('이동영',this)">👑 이동영 <span class="filter-count" id="cnt-이동영">0</span></button>
      <button class="filter-tab" onclick="filterMember('임동석',this)">임동석 <span class="filter-count" id="cnt-임동석">0</span></button>
      <button class="filter-tab" onclick="filterMember('조세은',this)">조세은 <span class="filter-count" id="cnt-조세은">0</span></button>
    </div>
    <div class="btn-group">
      <button class="btn-history" onclick="openHistoryModal()">📋 완료 내역</button>
      <button class="btn-clear" onclick="clearDoneTasks()">🔄 일일 완료 목록 초기화</button>
      <button class="btn-add-task" onclick="openAddModal('todo')">＋ 업무 추가</button>
    </div>
  </div>

  <div class="task-board">
    <div class="task-column">
      <div class="column-header"><div class="column-title"><div class="col-dot todo"></div>할 일</div><div class="col-count" id="col-todo-count">0</div></div>
      <div class="task-list" id="col-todo"></div>
      <button class="add-task-btn" onclick="openAddModal('todo')">＋ 업무 추가</button>
    </div>
    <div class="task-column">
      <div class="column-header"><div class="column-title"><div class="col-dot doing"></div>진행 중</div><div class="col-count" id="col-doing-count">0</div></div>
      <div class="task-list" id="col-doing"></div>
      <button class="add-task-btn" onclick="openAddModal('doing')">＋ 업무 추가</button>
    </div>
    <div class="task-column">
      <div class="column-header">
        <div class="column-title"><div class="col-dot done"></div>완료</div>
        <div class="done-header-actions">
          <div class="col-count" id="col-done-count">0</div>
          <button class="btn-clear-done" onclick="openHistoryModal()">📋 전체 완료내역 보기</button>
        </div>
      </div>
      <div class="task-list" id="col-done"></div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">📝 업무 등록</div><button class="modal-close" onclick="closeModal('addModal')">✕</button></div>
    <div class="form-group"><label class="form-label">업무 제목 *</label><input type="text" class="form-input" id="taskTitle" placeholder="예) 블로그 포스팅 작성"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">담당자 *</label>
        <select class="form-select" id="taskAssignee">
          <option value="이동영">👑 이동영 (대표)</option>
          <option value="임동석">임동석</option>
          <option value="조세은">조세은</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">우선순위</label>
        <select class="form-select" id="taskPriority">
          <option value="high">🔴 높음</option>
          <option value="mid" selected>🟡 보통</option>
          <option value="low">🟢 낮음</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">업무 내용 (선택)</label><textarea class="form-textarea" id="taskDesc" placeholder="상세 내용이나 참고 사항"></textarea></div>
    <button class="btn-primary" onclick="addTask()">✅ 업무 등록</button>
  </div>
</div>

<!-- Complete Modal -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">✅ 업무 완료 보고</div><button class="modal-close" onclick="closeModal('completeModal')">✕</button></div>
    <div class="form-group"><label class="form-label">완료한 업무</label><input type="text" class="form-input" id="completeTaskName" readonly style="color:var(--text2);"></div>
    <div class="form-group"><label class="form-label">완료 내용 *</label><textarea class="form-textarea" style="min-height:100px;" id="completeNote" placeholder="완료 내용을 입력하세요&#10;예) 포스팅 2개 완료. 예약 발행 설정까지 끝냄."></textarea></div>
    <button class="btn-primary" onclick="completeTask()">📤 완료 보고 제출</button>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">📋 완료 업무 내역</div>
      <button class="modal-close" onclick="closeModal('historyModal')">✕</button>
    </div>
    <div class="history-tabs">
      <button class="history-tab active" onclick="switchHistoryTab('all',this)">전체</button>
      <button class="history-tab" onclick="switchHistoryTab('이동영',this)">👑 이동영</button>
      <button class="history-tab" onclick="switchHistoryTab('임동석',this)">임동석</button>
      <button class="history-tab" onclick="switchHistoryTab('조세은',this)">조세은</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="history-footer">
      <button class="btn-secondary" onclick="closeModal('historyModal')">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zbqpfkpsqrknwbfxtwfx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OZmmr1rN-7fBbp1P2tFT7w_rR4VK4zC';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tasks = [], currentFilter = 'all', addTarget = 'todo', completeTargetId = null, historyFilter = 'all';

async function init() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateDisplay').textContent = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
  await loadTasks();
  subscribeRealtime();
  document.getElementById('loadingOverlay').style.display = 'none';
}

async function loadTasks() {
  const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: false });
  if (error) { showToast('❗ 데이터 로드 실패'); return; }
  tasks = data || [];
  renderAll();
}

function subscribeRealtime() {
  db.channel('tasks-ch')
    .on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, () => loadTasks())
    .subscribe();
}

function renderAll() { renderBoard(); renderStats(); renderCounts(); }

function renderBoard() {
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.assignee === currentFilter);
  ['todo','doing','done'].forEach(status => {
    const col = document.getElementById(`col-${status}`);
    const cnt = document.getElementById(`col-${status}-count`);
    const items = filtered.filter(t => t.status === status);
    cnt.textContent = items.length;
    col.innerHTML = items.length === 0
      ? `<div style="text-align:center;padding:28px;color:var(--text3);font-size:12px;">없음</div>`
      : items.map(taskCardHTML).join('');
  });
}

function taskCardHTML(t) {
  const ac = t.assignee==='이동영'?'avatar-me':t.assignee==='임동석'?'avatar-1':'avatar-2';
  const al = t.assignee==='이동영'?'동영':t.assignee==='임동석'?'동석':'세은';
  const pc = {high:'priority-high',mid:'priority-mid',low:'priority-low'}[t.priority]||'priority-mid';
  const pl = {high:'높음',mid:'보통',low:'낮음'}[t.priority]||'보통';
  let actions = '';
  if (t.status==='todo') actions = `<button class="btn-start" onclick="moveTask('${t.id}','doing')">▶ 시작</button>`;
  else if (t.status==='doing') actions = `<button class="btn-done" onclick="openCompleteModal('${t.id}')">✓ 완료</button>`;
  return `<div class="task-card">
    <div class="task-header"><div class="task-title">${t.title}</div><div class="task-priority ${pc}">${pl}</div></div>
    ${t.description?`<div class="task-desc">${t.description}</div>`:''}
    ${t.complete_note?`<div class="task-note">📝 ${t.complete_note}</div>`:''}
    <div class="task-meta">
      <div class="task-assignee"><div class="mini-avatar ${ac}">${al}</div>${t.assignee}</div>
      <div class="task-time">${t.task_time||''}</div>
      ${actions}
      <button class="btn-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>
  </div>`;
}

function renderStats() {
  const total=tasks.length, done=tasks.filter(t=>t.status==='done').length, doing=tasks.filter(t=>t.status==='doing').length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDoing').textContent=doing;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRate').textContent=(total>0?Math.round(done/total*100):0)+'%';
}

function renderCounts() {
  document.getElementById('cnt-all').textContent=tasks.length;
  ['이동영','임동석','조세은'].forEach(n=>{const el=document.getElementById(`cnt-${n}`);if(el)el.textContent=tasks.filter(t=>t.assignee===n).length;});
}

function filterMember(m,el) {
  currentFilter=m;
  document.querySelectorAll('.filter-tab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderBoard();
}

// 히스토리 모달
let historyData = [];

async function openHistoryModal() {
  historyFilter = 'all';
  document.querySelectorAll('.history-tab').forEach((t,i)=>{ t.classList.toggle('active', i===0); });
  const { data } = await db.from('history').select('*').order('created_at', { ascending: false });
  historyData = data || [];
  renderHistoryList();
  document.getElementById('historyModal').classList.add('open');
}

function switchHistoryTab(filter, el) {
  historyFilter = filter;
  document.querySelectorAll('.history-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderHistoryList();
}

function renderHistoryList() {
  const filtered = historyFilter === 'all' ? historyData : historyData.filter(t => t.assignee === historyFilter);
  const container = document.getElementById('historyList');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="history-empty">완료 내역이 없습니다</div>`;
    return;
  }
  container.innerHTML = filtered.map(t => {
    const ac = t.assignee==='이동영'?'avatar-me':t.assignee==='임동석'?'avatar-1':'avatar-2';
    const al = t.assignee==='이동영'?'동영':t.assignee==='임동석'?'동석':'세은';
    return `<div class="history-item">
      <div class="history-item-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="mini-avatar ${ac}">${al}</div>
          <div class="history-item-title">${t.title}</div>
        </div>
        <div class="history-item-time">${t.completed_at||''}</div>
      </div>
      ${t.complete_note?`<div class="history-item-note">📝 ${t.complete_note}</div>`:'<div style="font-size:11px;color:var(--text3);">완료 보고 없음</div>'}
    </div>`;
  }).join('');
}

async function clearDoneTasks() {
  if (!confirm(`칸반보드의 완료 목록을 초기화할까요?\n✅ 완료 내역은 별도 보관됩니다.`)) return;
  const ids = tasks.filter(t => t.status === 'done').map(t => t.id);
  if (ids.length === 0) { showToast('초기화할 항목이 없습니다'); return; }
  const { error } = await db.from('tasks').delete().in('id', ids);
  if (error) { showToast('❗ 초기화 실패'); return; }
  closeModal('historyModal');
  showToast('✅ 완료 목록 초기화! 내역은 보관됩니다');
}

function openAddModal(s) {
  addTarget=s;
  document.getElementById('taskTitle').value='';
  document.getElementById('taskDesc').value='';
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('taskTitle').focus(),100);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function addTask() {
  const title=document.getElementById('taskTitle').value.trim();
  if(!title){showToast('❗ 업무 제목을 입력하세요');return;}
  const now=new Date(), time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const{error}=await db.from('tasks').insert({title,assignee:document.getElementById('taskAssignee').value,priority:document.getElementById('taskPriority').value,status:addTarget,description:document.getElementById('taskDesc').value.trim(),task_time:time,from_command:false});
  if(error){showToast('❗ 등록 실패: '+error.message);return;}
  closeModal('addModal');showToast('✅ 업무 등록 완료');
}

async function moveTask(id,status){await db.from('tasks').update({status}).eq('id',id);}

function openCompleteModal(id) {
  completeTargetId=id;
  const t=tasks.find(t=>String(t.id)===String(id));
  document.getElementById('completeTaskName').value=t?.title||'';
  document.getElementById('completeNote').value='';
  document.getElementById('completeModal').classList.add('open');
  setTimeout(()=>document.getElementById('completeNote').focus(),100);
}

async function completeTask() {
  const note=document.getElementById('completeNote').value.trim();
  if(!note){showToast('❗ 완료 내용을 입력하세요');return;}
  const t=tasks.find(t=>String(t.id)===String(completeTargetId));
  const now=new Date();
  const completedAt=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  await db.from('tasks').update({status:'done',complete_note:note}).eq('id',completeTargetId);
  await db.from('history').insert({
    title:t.title, assignee:t.assignee, priority:t.priority,
    description:t.description, complete_note:note,
    task_time:t.task_time, completed_at:completedAt
  });
  closeModal('completeModal');showToast('🎉 완료 보고 제출!');
}

async function deleteTask(id) {
  if(!confirm('삭제하시겠습니까?'))return;
  await db.from('tasks').delete().eq('id',id);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));});

init();
</script>
</body>
</html>
