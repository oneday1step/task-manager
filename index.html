<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루한보 업무관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f3ee;
  --surface: #ffffff;
  --surface2: #f0e8dc;
  --surface3: #e4d5c2;
  --accent: #5c3a1e;
  --accent2: #c0392b;
  --accent3: #2e7d4f;
  --accent4: #b05e10;
  --text: #1a0f05;
  --text2: #5a3d25;
  --text3: #96785a;
  --border: rgba(92,58,30,0.2);
  --shadow: rgba(92,58,30,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 48px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 24px;
  border-bottom: 3px solid var(--accent);
  margin-bottom: 32px;
}

.logo { display: flex; align-items: center; gap: 14px; }

.logo-icon {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px var(--shadow);
}

.logo h1 {
  font-size: 20px; font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo span {
  font-size: 11px; color: var(--text3);
  font-weight: 400; display: block; margin-top: 1px;
}

.header-right { display: flex; align-items: center; gap: 12px; }

.date-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text2);
  background: var(--surface2);
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border);
}

.view-tabs {
  display: flex; gap: 3px;
  background: var(--surface2);
  padding: 4px; border-radius: 12px;
  border: 1px solid var(--border);
}

.view-tab {
  padding: 8px 18px; border-radius: 8px;
  border: none; background: transparent;
  color: var(--text2);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.2s;
}

.view-tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--shadow);
}

/* Stats */
.stats-bar {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 16px; margin-bottom: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
}

.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 5px; height: 100%;
}
.stat-card:nth-child(1)::before { background: var(--accent); }
.stat-card:nth-child(2)::before { background: var(--accent4); }
.stat-card:nth-child(3)::before { background: var(--accent3); }
.stat-card:nth-child(4)::before { background: var(--accent2); }

.stat-label {
  font-size: 11px; color: var(--text3);
  font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 8px;
}

.stat-value {
  font-size: 40px; font-weight: 900;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.stat-card:nth-child(1) .stat-value { color: var(--accent); }
.stat-card:nth-child(2) .stat-value { color: var(--accent4); }
.stat-card:nth-child(3) .stat-value { color: var(--accent3); }
.stat-card:nth-child(4) .stat-value { color: var(--accent2); }

.stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Layout */
.main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.sidebar { display: flex; flex-direction: column; gap: 16px; }

.member-list, .quick-cmd {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 20px;
  box-shadow: 0 2px 8px var(--shadow);
}

.section-title {
  font-size: 10px; font-weight: 700;
  color: var(--text3); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.member-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 10px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
  border: 1px solid transparent;
}
.member-item:hover { background: var(--surface2); }
.member-item.active { background: var(--surface2); border-color: var(--border); }

.avatar {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; position: relative;
}
.avatar-me { background: var(--accent); color: #fff; }
.avatar-1 { background: var(--accent4); color: #fff; }
.avatar-2 { background: var(--accent3); color: #fff; }

.online-dot {
  position: absolute; bottom: -2px; right: -2px;
  width: 10px; height: 10px;
  background: var(--accent3); border-radius: 50%;
  border: 2px solid var(--surface);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }

.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 13px; font-weight: 600; color: var(--text); }
.member-role { font-size: 11px; color: var(--text3); margin-top: 1px; }
.member-count {
  background: var(--surface2); color: var(--text2);
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px; border-radius: 10px;
}

.cmd-select {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 12px; color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; margin-bottom: 10px; cursor: pointer;
}
.cmd-select:focus { outline: none; border-color: var(--accent); }
.cmd-select option { background: #fff; }

.cmd-input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; resize: none; min-height: 80px;
  transition: border-color 0.2s; margin-bottom: 10px;
}
.cmd-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,58,0.1); }
.cmd-input::placeholder { color: var(--text3); }

.btn-send {
  width: 100%; background: var(--accent);
  border: none; border-radius: 10px; padding: 11px;
  color: #fff; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; box-shadow: 0 3px 10px var(--shadow);
}
.btn-send:hover { background: #6a4d30; transform: translateY(-1px); }

/* Board */
.view-panel { display: none; }
.view-panel.active { display: block; }

.task-board { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }

.task-column {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}

.task-column:nth-child(1) { border-top: 3px solid var(--accent4); }
.task-column:nth-child(2) { border-top: 3px solid var(--accent); }
.task-column:nth-child(3) { border-top: 3px solid var(--accent3); }

.column-header {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.column-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text); }

.col-dot { width: 10px; height: 10px; border-radius: 50%; }
.col-dot.todo { background: var(--accent4); box-shadow: 0 0 0 3px rgba(176,94,16,0.15); }
.col-dot.doing { background: var(--accent); box-shadow: 0 0 0 3px rgba(92,58,30,0.15); }
.col-dot.done { background: var(--accent3); box-shadow: 0 0 0 3px rgba(46,125,79,0.15); }

.col-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text3);
  background: var(--surface2); padding: 2px 8px; border-radius: 10px;
}

.task-list {
  padding: 12px; min-height: 200px;
  display: flex; flex-direction: column; gap: 8px;
}

.task-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  cursor: pointer; transition: all 0.2s;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.task-card:hover { background: var(--surface3); transform: translateX(2px); }
.task-card.commander { border-left: 3px solid var(--accent2); }

.task-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.task-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }

.task-priority { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
.priority-high { background: rgba(192,57,43,0.12); color: var(--accent2); }
.priority-mid { background: rgba(176,125,58,0.12); color: var(--accent4); }
.priority-low { background: rgba(74,124,89,0.12); color: var(--accent3); }

.task-note { font-size: 11px; color: var(--text2); line-height: 1.5; margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); }

.task-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.task-assignee { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
.mini-avatar { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
.task-time { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }

.cmd-badge {
  font-size: 10px; background: rgba(192,57,43,0.1);
  color: var(--accent2); border: 1px solid rgba(192,57,43,0.2);
  padding: 2px 7px; border-radius: 6px;
}

.add-task-btn {
  width: calc(100% - 24px); margin: 0 12px 12px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: 10px; padding: 10px; color: var(--text3);
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-task-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,92,58,0.05); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(44,31,14,0.4); backdrop-filter: blur(4px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; width: 480px; max-width: 90vw;
  animation: modalIn 0.25s ease;
  box-shadow: 0 24px 80px rgba(44,31,14,0.2);
}
@keyframes modalIn { from{opacity:0;transform:translateY(12px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
.modal-close {
  background: var(--surface2); border: none; color: var(--text2);
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.modal-close:hover { background: var(--surface3); }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; transition: border-color 0.2s;
}
.form-textarea { min-height: 80px; resize: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,58,0.1); }
.form-select option { background: #fff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-primary {
  width: 100%; background: var(--accent);
  border: none; border-radius: 10px; padding: 12px;
  color: #fff; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-top: 8px;
  box-shadow: 0 4px 12px var(--shadow);
}
.btn-primary:hover { background: #6a4d30; transform: translateY(-1px); }

/* Monitor */
.monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.monitor-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}

.monitor-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.monitor-avatar { width: 32px; height: 32px; border-radius: 8px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.monitor-name { font-size: 14px; font-weight: 700; color: var(--text); }
.monitor-status { font-size: 11px; color: var(--text3); }

.progress-bar { height: 4px; background: var(--surface2); }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }

.monitor-tasks { padding: 12px; max-height: 320px; overflow-y: auto; }
.monitor-task { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 8px; margin-bottom: 6px; transition: background 0.2s; }
.monitor-task:hover { background: var(--surface2); }

.task-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.task-check.done { background: var(--accent3); border-color: var(--accent3); color: #fff; }
.task-check.doing { background: rgba(124,92,58,0.2); border-color: var(--accent); }

.monitor-task-info { flex: 1; }
.monitor-task-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.monitor-task-note { font-size: 11px; color: var(--text2); line-height: 1.4; }
.monitor-task-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; }

.cmd-history { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; grid-column: 1/-1; box-shadow: 0 2px 8px var(--shadow); }
.cmd-history-list { padding: 12px; max-height: 200px; overflow-y: auto; }
.cmd-history-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; background: var(--surface2); }
.cmd-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 2px; }
.cmd-content { flex: 1; }
.cmd-to { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
.cmd-text { font-size: 12px; color: var(--text2); line-height: 1.4; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size: 13px; color: var(--text3); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--accent); border-radius: 12px;
  padding: 14px 20px; font-size: 13px; color: #fff;
  box-shadow: 0 8px 24px var(--shadow); z-index: 200;
  display: none; animation: toastIn 0.3s ease;
}
@keyframes toastIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.sync-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--accent3);
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; }

@media(max-width:900px) {
  .main-layout{grid-template-columns:1fr}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .task-board{grid-template-columns:1fr}
  .monitor-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🚀</div>
      <div>
        <h1>하루한보 업무관리</h1>
        <span class="sync-badge"><span class="sync-dot"></span>실시간 공유 중</span>
      </div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="dateDisplay"></div>
      <div class="view-tabs">
        <button class="view-tab active" onclick="switchView('board',this)">📋 칸반보드</button>
        <button class="view-tab" onclick="switchView('monitor',this)">📊 모니터링</button>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">오늘 전체 업무</div><div class="stat-value" id="statTotal">0</div><div class="stat-sub">등록된 태스크</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-value" id="statDoing">0</div><div class="stat-sub">처리 중인 업무</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-value" id="statDone">0</div><div class="stat-sub">오늘 처리 완료</div></div>
    <div class="stat-card"><div class="stat-label">완료율</div><div class="stat-value" id="statRate">0%</div><div class="stat-sub">목표 달성 현황</div></div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="member-list">
        <div class="section-title">팀원</div>
        <div class="member-item active" onclick="filterMember('all',this)">
          <div class="avatar avatar-me">👑</div>
          <div class="member-info"><div class="member-name">전체보기</div><div class="member-role">All Tasks</div></div>
          <div class="member-count" id="cnt-all">0</div>
        </div>
        <div class="member-item" onclick="filterMember('나',this)">
          <div class="avatar avatar-me" style="font-size:12px;">나</div>
          <div class="member-info"><div class="member-name">나 (대표)</div><div class="member-role">하루한보</div></div>
          <div class="member-count" id="cnt-나">0</div>
        </div>
        <div class="member-item" onclick="filterMember('직원1',this)">
          <div class="avatar avatar-1" style="position:relative;">직1<span class="online-dot"></span></div>
          <div class="member-info"><div class="member-name">직원 1</div><div class="member-role">콘텐츠 담당</div></div>
          <div class="member-count" id="cnt-직원1">0</div>
        </div>
        <div class="member-item" onclick="filterMember('직원2',this)">
          <div class="avatar avatar-2">직2</div>
          <div class="member-info"><div class="member-name">직원 2</div><div class="member-role">운영 담당</div></div>
          <div class="member-count" id="cnt-직원2">0</div>
        </div>
      </div>

      <div class="quick-cmd">
        <div class="section-title">업무 지시</div>
        <select class="cmd-select" id="cmdTarget">
          <option value="">대상 선택</option>
          <option value="직원1">직원 1 (콘텐츠)</option>
          <option value="직원2">직원 2 (운영)</option>
          <option value="전체">전체 공지</option>
        </select>
        <textarea class="cmd-input" id="cmdText" placeholder="업무 지시 내용을 입력하세요...&#10;예) 오늘 블로그 포스팅 2개 마무리 해주세요"></textarea>
        <button class="btn-send" onclick="sendCommand()">📢 지시 보내기</button>
      </div>
    </div>

    <div class="main-content">
      <div class="view-panel active" id="view-board">
        <div class="task-board">
          <div class="task-column">
            <div class="column-header"><div class="column-title"><div class="col-dot todo"></div>할 일</div><div class="col-count" id="col-todo-count">0</div></div>
            <div class="task-list" id="col-todo"></div>
            <button class="add-task-btn" onclick="openAddModal('todo')">＋ 업무 추가</button>
          </div>
          <div class="task-column">
            <div class="column-header"><div class="column-title"><div class="col-dot doing"></div>진행 중</div><div class="col-count" id="col-doing-count">0</div></div>
            <div class="task-list" id="col-doing"></div>
            <button class="add-task-btn" onclick="openAddModal('doing')">＋ 업무 추가</button>
          </div>
          <div class="task-column">
            <div class="column-header"><div class="column-title"><div class="col-dot done"></div>완료</div><div class="col-count" id="col-done-count">0</div></div>
            <div class="task-list" id="col-done"></div>
          </div>
        </div>
      </div>

      <div class="view-panel" id="view-monitor">
        <div class="monitor-grid">
          <div class="monitor-card">
            <div class="monitor-header">
              <div class="monitor-avatar avatar-1">직1</div>
              <div><div class="monitor-name">직원 1</div><div class="monitor-status">콘텐츠 담당</div></div>
              <div style="margin-left:auto;text-align:right;"><div style="font-size:22px;font-weight:900;color:var(--accent4);font-family:'JetBrains Mono',monospace;" id="mon1-rate">0%</div><div style="font-size:10px;color:var(--text3);">완료율</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="mon1-bar" style="width:0%;background:var(--accent4);"></div></div>
            <div class="monitor-tasks" id="mon1-tasks"></div>
          </div>
          <div class="monitor-card">
            <div class="monitor-header">
              <div class="monitor-avatar avatar-2">직2</div>
              <div><div class="monitor-name">직원 2</div><div class="monitor-status">운영 담당</div></div>
              <div style="margin-left:auto;text-align:right;"><div style="font-size:22px;font-weight:900;color:var(--accent3);font-family:'JetBrains Mono',monospace;" id="mon2-rate">0%</div><div style="font-size:10px;color:var(--text3);">완료율</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="mon2-bar" style="width:0%;background:var(--accent3);"></div></div>
            <div class="monitor-tasks" id="mon2-tasks"></div>
          </div>
          <div class="cmd-history">
            <div class="column-header"><div class="column-title">📢 지시 내역</div></div>
            <div class="cmd-history-list" id="cmdHistory"><div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">아직 지시 내역이 없습니다</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">📝 업무 등록</div><button class="modal-close" onclick="closeModal('addModal')">✕</button></div>
    <div class="form-group"><label class="form-label">업무 제목 *</label><input type="text" class="form-input" id="taskTitle" placeholder="예) 블로그 포스팅 작성"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">담당자 *</label><select class="form-select" id="taskAssignee"><option value="나">나 (대표)</option><option value="직원1">직원 1</option><option value="직원2">직원 2</option></select></div>
      <div class="form-group"><label class="form-label">우선순위</label><select class="form-select" id="taskPriority"><option value="high">🔴 높음</option><option value="mid" selected>🟡 보통</option><option value="low">🔵 낮음</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">업무 내용 (선택)</label><textarea class="form-textarea" id="taskDesc" placeholder="상세 내용이나 참고 사항"></textarea></div>
    <button class="btn-primary" onclick="addTask()">✅ 업무 등록</button>
  </div>
</div>

<!-- Complete Modal -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">✅ 업무 완료 보고</div><button class="modal-close" onclick="closeModal('completeModal')">✕</button></div>
    <div class="form-group"><label class="form-label">완료한 업무</label><input type="text" class="form-input" id="completeTaskName" readonly style="color:var(--text2);"></div>
    <div class="form-group"><label class="form-label">완료 보고 내용 *</label><textarea class="form-textarea" style="min-height:100px;" id="completeNote" placeholder="완료 내용을 입력하세요&#10;예) 블로그 포스팅 2개 완료. 조회수 목표 대비 120% 달성."></textarea></div>
    <button class="btn-primary" onclick="completeTask()">📤 완료 보고 제출</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zbqpfkpsqrknwbfxtwfx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OZmmr1rN-7fBbp1P2tFT7w_rR4VK4zC';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let tasks = [], commands = [], currentFilter = 'all', addTarget = 'todo', completeTargetId = null;

async function init() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateDisplay').textContent = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
  await loadTasks();
  await loadCommands();
  subscribeRealtime();
  document.getElementById('loadingOverlay').style.display = 'none';
}

async function loadTasks() {
  const { data, error } = await db.from('tasks').select('*').order('created_at', { ascending: false });
  if (error) { showToast('❗ 데이터 로드 실패'); return; }
  tasks = data || [];
  renderAll();
}

async function loadCommands() {
  const { data } = await db.from('commands').select('*').order('created_at', { ascending: false }).limit(20);
  commands = data || [];
  renderCmdHistory();
}

function subscribeRealtime() {
  db.channel('tasks-ch').on('postgres_changes', { event:'*', schema:'public', table:'tasks' }, () => loadTasks()).subscribe();
  db.channel('commands-ch').on('postgres_changes', { event:'*', schema:'public', table:'commands' }, () => loadCommands()).subscribe();
}

function renderAll() { renderBoard(); renderMonitor(); renderStats(); renderCounts(); }

function renderBoard() {
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.assignee === currentFilter);
  ['todo','doing','done'].forEach(status => {
    const col = document.getElementById(`col-${status}`);
    const cnt = document.getElementById(`col-${status}-count`);
    const items = filtered.filter(t => t.status === status);
    cnt.textContent = items.length;
    col.innerHTML = items.length === 0
      ? `<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px;">없음</div>`
      : items.map(taskCardHTML).join('');
  });
}

function taskCardHTML(t) {
  const avatarClass = t.assignee === '나' ? 'avatar-me' : t.assignee === '직원1' ? 'avatar-1' : 'avatar-2';
  const avatarLabel = t.assignee === '나' ? '나' : t.assignee === '직원1' ? '직1' : '직2';
  const priorityClass = {high:'priority-high',mid:'priority-mid',low:'priority-low'}[t.priority]||'priority-mid';
  const priorityLabel = {high:'높음',mid:'보통',low:'낮음'}[t.priority]||'보통';
  let actions = '';
  if (t.status === 'todo') actions = `<button onclick="moveTask('${t.id}','doing')" style="background:rgba(124,92,58,0.12);border:none;color:var(--accent);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;">▶ 시작</button>`;
  else if (t.status === 'doing') actions = `<button onclick="openCompleteModal('${t.id}')" style="background:rgba(74,124,89,0.12);border:none;color:var(--accent3);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;">✓ 완료</button>`;
  return `<div class="task-card${t.from_command?' commander':''}">
    <div class="task-header"><div class="task-title">${t.title}</div><div class="task-priority ${priorityClass}">${priorityLabel}</div></div>
    ${t.description?`<div style="font-size:11px;color:var(--text3);margin-bottom:4px;">${t.description}</div>`:''}
    ${t.complete_note?`<div class="task-note">📝 ${t.complete_note}</div>`:''}
    ${t.from_command?`<div style="margin-top:6px;"><span class="cmd-badge">📢 지시 업무</span></div>`:''}
    <div class="task-meta">
      <div class="task-assignee"><div class="mini-avatar ${avatarClass}">${avatarLabel}</div>${t.assignee}</div>
      <div class="task-time">${t.task_time||''}</div>
      ${actions}
      <button onclick="deleteTask('${t.id}')" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 6px;" title="삭제">✕</button>
    </div>
  </div>`;
}

function renderStats() {
  const total=tasks.length, done=tasks.filter(t=>t.status==='done').length, doing=tasks.filter(t=>t.status==='doing').length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDoing').textContent=doing;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRate').textContent=(total>0?Math.round(done/total*100):0)+'%';
}

function renderCounts() {
  document.getElementById('cnt-all').textContent=tasks.length;
  ['나','직원1','직원2'].forEach(n=>{const el=document.getElementById(`cnt-${n}`);if(el)el.textContent=tasks.filter(t=>t.assignee===n).length;});
}

function renderMonitor() {
  ['직원1','직원2'].forEach((m,i)=>{
    const idx=i+1, mt=tasks.filter(t=>t.assignee===m), done=mt.filter(t=>t.status==='done').length;
    const rate=mt.length>0?Math.round(done/mt.length*100):0;
    document.getElementById(`mon${idx}-rate`).textContent=rate+'%';
    document.getElementById(`mon${idx}-bar`).style.width=rate+'%';
    const c=document.getElementById(`mon${idx}-tasks`);
    c.innerHTML=mt.length===0?`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">등록된 업무 없음</div>`:mt.map(t=>{
      const cc=t.status==='done'?'done':t.status==='doing'?'doing':'';
      const ci=t.status==='done'?'✓':t.status==='doing'?'●':'';
      return `<div class="monitor-task"><div class="task-check ${cc}">${ci}</div><div class="monitor-task-info"><div class="monitor-task-name">${t.title}</div>${t.complete_note?`<div class="monitor-task-note">${t.complete_note}</div>`:''}</div><div class="monitor-task-time">${t.task_time||''}</div></div>`;
    }).join('');
  });
}

function renderCmdHistory() {
  const c=document.getElementById('cmdHistory');
  if(!commands.length){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">아직 지시 내역이 없습니다</div>`;return;}
  c.innerHTML=commands.map(cmd=>`<div class="cmd-history-item"><div class="cmd-time">${cmd.cmd_time||''}</div><div class="cmd-content"><div class="cmd-to">→ ${cmd.target}</div><div class="cmd-text">${cmd.content}</div></div></div>`).join('');
}

function openAddModal(s){addTarget=s;document.getElementById('taskTitle').value='';document.getElementById('taskDesc').value='';document.getElementById('addModal').classList.add('open');setTimeout(()=>document.getElementById('taskTitle').focus(),100);}
function closeModal(id){document.getElementById(id).classList.remove('open');}

async function addTask(){
  const title=document.getElementById('taskTitle').value.trim();
  if(!title){showToast('❗ 업무 제목을 입력하세요');return;}
  const now=new Date(), time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const{error}=await db.from('tasks').insert({title,assignee:document.getElementById('taskAssignee').value,priority:document.getElementById('taskPriority').value,status:addTarget,description:document.getElementById('taskDesc').value.trim(),task_time:time,from_command:false});
  if(error){showToast('❗ 등록 실패: '+error.message);return;}
  closeModal('addModal');showToast('✅ 업무가 등록되었습니다');
}

async function moveTask(id,status){await db.from('tasks').update({status}).eq('id',id);}

function openCompleteModal(id){
  completeTargetId=id;
  const t=tasks.find(t=>String(t.id)===String(id));
  document.getElementById('completeTaskName').value=t?.title||'';
  document.getElementById('completeNote').value='';
  document.getElementById('completeModal').classList.add('open');
  setTimeout(()=>document.getElementById('completeNote').focus(),100);
}

async function completeTask(){
  const note=document.getElementById('completeNote').value.trim();
  if(!note){showToast('❗ 완료 내용을 입력하세요');return;}
  await db.from('tasks').update({status:'done',complete_note:note}).eq('id',completeTargetId);
  closeModal('completeModal');showToast('🎉 완료 보고 제출!');
}

async function deleteTask(id){if(!confirm('삭제하시겠습니까?'))return;await db.from('tasks').delete().eq('id',id);}

async function sendCommand(){
  const to=document.getElementById('cmdTarget').value, text=document.getElementById('cmdText').value.trim();
  if(!to){showToast('❗ 대상을 선택하세요');return;}
  if(!text){showToast('❗ 지시 내용을 입력하세요');return;}
  const now=new Date(), time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  await db.from('commands').insert({target:to,content:text,cmd_time:time});
  if(to!=='전체') await db.from('tasks').insert({title:text.length>40?text.slice(0,40)+'...':text,assignee:to,priority:'high',status:'todo',description:text,task_time:time,from_command:true});
  document.getElementById('cmdText').value='';
  showToast(`📢 ${to}에게 지시 완료`);
}

function filterMember(m,el){currentFilter=m;document.querySelectorAll('.member-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');renderBoard();}
function switchView(v,el){document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById(`view-${v}`).classList.add('active');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));});

init();
</script>
</body>
</html>
